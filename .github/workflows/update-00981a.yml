name: Update 00981A data

on:
  schedule:
    # 20:05-23:50 Asia/Taipei, every 15 minutes = 12:05-15:50 UTC.
    # GitHub scheduled workflows can be delayed or dropped, so retry during the update window.
    - cron: "5,20,35,50 12-15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and update data
        run: python update_00981a.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshots *.xlsx
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update 00981A daily data"
            git push
          fi
