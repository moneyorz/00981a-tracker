<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>00981A 每日異動</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #fff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --head: #f3f4f6;
      --blue: #2563eb;
      --red: #dc2626;
      --green: #059669;
      --gray: #4b5563;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      line-height: 1.5;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 16px 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
    }

    .source {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .toolbar,
    .summary,
    .price-panel,
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 180px 160px 1fr auto;
      gap: 10px;
      align-items: end;
      padding: 14px;
      margin-bottom: 12px;
    }

    .notice {
      display: none;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      color: #92400e;
      margin-bottom: 12px;
      padding: 12px 14px;
      font-size: 14px;
    }

    .notice input {
      display: block;
      width: 100%;
      max-width: 360px;
      height: auto;
      margin-top: 8px;
      padding: 7px;
      background: #fff;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    select,
    input,
    button {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    select,
    input { padding: 0 10px; }

    button {
      width: auto;
      min-width: 88px;
      padding: 0 14px;
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .metric {
      padding: 12px 14px;
      border-right: 1px solid var(--line);
    }

    .metric:last-child { border-right: 0; }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 3px;
      font-size: 22px;
    }

    .price-panel {
      display: none;
      margin-bottom: 12px;
      padding: 14px;
    }

    .price-panel.active { display: block; }

    .price-head {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .price-title {
      margin: 0;
      font-size: 18px;
    }

    .price-meta,
    .price-status {
      color: var(--muted);
      font-size: 13px;
    }

    .price-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin: 12px 0;
    }

    .price-stat {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
    }

    .price-stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .price-stat strong {
      display: block;
      margin-top: 4px;
      font-size: 18px;
      font-variant-numeric: tabular-nums;
    }

    .price-chart {
      width: 100%;
      height: 260px;
      margin-top: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .price-chart text {
      fill: var(--muted);
      font-size: 11px;
    }

    .price-detail {
      margin-top: 10px;
      max-height: 220px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .price-detail table { min-width: 520px; }

    .table-wrap { overflow: auto; }

    table {
      width: 100%;
      min-width: 800px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: var(--head);
      font-size: 13px;
      z-index: 1;
    }

    tbody tr[data-code] { cursor: pointer; }
    tbody tr:hover { background: #f9fafb; }
    tbody tr.selected { background: #eff6ff; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }

    .tag {
      display: inline-block;
      min-width: 44px;
      padding: 2px 8px;
      border-radius: 999px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
    }

    .新增 { background: #fee2e2; color: var(--red); }
    .增加 { background: #fee2e2; color: var(--red); }
    .減少 { background: #dcfce7; color: var(--green); }
    .刪除 { background: #e5e7eb; color: var(--gray); }

    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 720px) {
      header { display: block; }
      .source { margin-top: 6px; text-align: left; }
      .toolbar,
      .summary { grid-template-columns: 1fr; }
      .price-head { display: block; }
      .price-summary { grid-template-columns: 1fr 1fr; }
      .metric { border-right: 0; border-bottom: 1px solid var(--line); }
      .metric:last-child { border-bottom: 0; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>00981A 每日異動</h1>
      <div class="source" id="source">讀取每日異動紀錄.xlsx...</div>
    </header>

    <section class="toolbar">
      <div>
        <label for="dateFilter">日期</label>
        <select id="dateFilter"></select>
      </div>
      <div>
        <label for="statusFilter">異動狀況</label>
        <select id="statusFilter">
          <option value="">全部</option>
          <option value="新增">新增</option>
          <option value="增加">增加</option>
          <option value="減少">減少</option>
          <option value="刪除">刪除</option>
        </select>
      </div>
      <div>
        <label for="keywordFilter">搜尋</label>
        <input id="keywordFilter" type="search" placeholder="股票代號或名稱">
      </div>
      <button id="reloadButton" type="button">重新讀取</button>
    </section>

    <section class="notice" id="localNotice">
      直接開啟本機 HTML 時，瀏覽器會阻擋自動讀取旁邊的 Excel。發佈到 GitHub Pages 後會自動讀取；本機預覽可先手動選擇每日異動紀錄.xlsx。
      <input id="fileInput" type="file" accept=".xlsx,.xls">
    </section>

    <section class="summary">
      <div class="metric"><span>符合筆數</span><strong id="total">0</strong></div>
      <div class="metric"><span>新增/增加</span><strong id="buy">0</strong></div>
      <div class="metric"><span>減少/刪除</span><strong id="sell">0</strong></div>
      <div class="metric"><span>權重淨變化</span><strong id="weight">0.00%</strong></div>
    </section>

    <section class="price-panel" id="pricePanel">
      <div class="price-head">
        <div>
          <h2 class="price-title" id="priceTitle">選擇一筆異動紀錄</h2>
          <div class="price-meta" id="priceMeta">點選下方任一列，查看該股票後續最多 30 個交易日股價。</div>
        </div>
        <div class="price-status" id="priceStatus"></div>
      </div>
      <div class="price-summary" id="priceSummary"></div>
      <svg class="price-chart" id="priceChart" viewBox="0 0 760 260" role="img" aria-label="股價走勢"></svg>
      <div class="price-detail">
        <table>
          <thead>
            <tr>
              <th>交易日</th>
              <th class="num">收盤價</th>
              <th class="num">漲跌</th>
              <th class="num">漲跌幅</th>
            </tr>
          </thead>
          <tbody id="priceRows">
            <tr><td class="empty" colspan="4">尚未選擇異動紀錄</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>股票代號</th>
            <th>股票名稱</th>
            <th>異動狀況</th>
            <th class="num">異動股數</th>
            <th class="num">異動持股權重</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td class="empty" colspan="6">讀取中...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    const EXCEL_PATH = "每日異動紀錄.xlsx";
    const PRICE_DAYS = 30;
    const MARKET_TWSE = "twse";
    const MARKET_TPEX = "tpex";
    let allRows = [];
    let selectedRowKey = "";
    const priceCache = new Map();

    const source = document.querySelector("#source");
    const dateFilter = document.querySelector("#dateFilter");
    const statusFilter = document.querySelector("#statusFilter");
    const keywordFilter = document.querySelector("#keywordFilter");
    const reloadButton = document.querySelector("#reloadButton");
    const localNotice = document.querySelector("#localNotice");
    const fileInput = document.querySelector("#fileInput");
    const rowsBody = document.querySelector("#rows");
    const pricePanel = document.querySelector("#pricePanel");
    const priceTitle = document.querySelector("#priceTitle");
    const priceMeta = document.querySelector("#priceMeta");
    const priceStatus = document.querySelector("#priceStatus");
    const priceSummary = document.querySelector("#priceSummary");
    const priceChart = document.querySelector("#priceChart");
    const priceRows = document.querySelector("#priceRows");

    function cleanDate(value) {
      const text = String(value ?? "").trim().replace(/\.0$/, "");
      return text;
    }

    function showDate(value) {
      const text = cleanDate(value);
      return /^\d{8}$/.test(text)
        ? `${text.slice(0, 4)}-${text.slice(4, 6)}-${text.slice(6, 8)}`
        : text;
    }

    function toNumber(value) {
      return Number(String(value ?? "0").replace(/,/g, "")) || 0;
    }

    function useWorkbookBuffer(buffer, fileName = EXCEL_PATH) {
      const workbook = XLSX.read(buffer, { type: "array" });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rawRows = XLSX.utils.sheet_to_json(sheet, { defval: "" });

      allRows = rawRows
        .map((row) => ({
          date: cleanDate(row["日期"]),
          code: String(row["股票代號"] ?? "").trim(),
          name: String(row["股票名稱"] ?? "").trim(),
          status: String(row["異動狀況"] ?? "").trim(),
          shares: toNumber(row["異動股數"]),
          weight: toNumber(row["異動持股權重"])
        }))
        .filter((row) => row.date && row.code);

      setupDates();
      render();
      source.textContent = `已讀取 ${fileName}，共 ${allRows.length.toLocaleString("zh-TW")} 筆資料`;
    }

    async function loadWorkbook() {
      source.textContent = "讀取每日異動紀錄.xlsx...";
      rowsBody.innerHTML = `<tr><td class="empty" colspan="6">讀取中...</td></tr>`;

      try {
        const response = await fetch(`${EXCEL_PATH}?v=${Date.now()}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const buffer = await response.arrayBuffer();
        localNotice.style.display = "none";
        useWorkbookBuffer(buffer);
      } catch (error) {
        localNotice.style.display = location.protocol === "file:" ? "block" : "none";
        source.textContent = location.protocol === "file:"
          ? "本機直接開啟時無法自動讀取"
          : "讀取失敗，請確認 Excel 與 index.html 放在同一層";
        rowsBody.innerHTML = `<tr><td class="empty" colspan="6">無法讀取每日異動紀錄.xlsx</td></tr>`;
      }
    }

    function setupDates() {
      const dates = [...new Set(allRows.map((row) => row.date))].sort().reverse();
      dateFilter.innerHTML = `<option value="">全部日期</option>` + dates
        .map((date) => `<option value="${escapeHtml(date)}">${showDate(date)}</option>`)
        .join("");
    }

    function getFilteredRows() {
      const date = dateFilter.value;
      const status = statusFilter.value;
      const keyword = keywordFilter.value.trim().toLowerCase();

      return allRows.filter((row) => {
        const text = `${row.code} ${row.name}`.toLowerCase();
        return (!date || row.date === date)
          && (!status || row.status === status)
          && (!keyword || text.includes(keyword));
      });
    }

    function render() {
      const visibleRows = getFilteredRows();
      updateSummary(visibleRows);

      if (!visibleRows.length) {
        rowsBody.innerHTML = `<tr><td class="empty" colspan="6">沒有符合條件的資料</td></tr>`;
        return;
      }

      rowsBody.innerHTML = visibleRows.map((row) => {
        const key = rowKey(row);
        return `
        <tr data-key="${escapeHtml(key)}" data-date="${escapeHtml(row.date)}" data-code="${escapeHtml(row.code)}" data-name="${escapeHtml(row.name)}" class="${key === selectedRowKey ? "selected" : ""}" tabindex="0">
          <td>${showDate(row.date)}</td>
          <td>${escapeHtml(row.code)}</td>
          <td>${escapeHtml(row.name)}</td>
          <td><span class="tag ${escapeHtml(row.status)}">${escapeHtml(row.status)}</span></td>
          <td class="num">${row.shares.toLocaleString("zh-TW")}</td>
          <td class="num">${formatWeight(row.weight)}</td>
        </tr>
      `;
      }).join("");
    }

    function updateSummary(visibleRows) {
      const buyCount = visibleRows.filter((row) => row.status === "新增" || row.status === "增加").length;
      const sellCount = visibleRows.filter((row) => row.status === "減少" || row.status === "刪除").length;
      const netWeight = visibleRows.reduce((sum, row) => sum + row.weight, 0);

      document.querySelector("#total").textContent = visibleRows.length.toLocaleString("zh-TW");
      document.querySelector("#buy").textContent = buyCount.toLocaleString("zh-TW");
      document.querySelector("#sell").textContent = sellCount.toLocaleString("zh-TW");
      document.querySelector("#weight").textContent = formatWeight(netWeight);
    }

    function formatWeight(value) {
      return `${value > 0 ? "+" : ""}${value.toFixed(2)}%`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function rowKey(row) {
      return `${row.date}-${row.code}-${row.status}-${row.shares}-${row.weight}`;
    }

    function parseDate(value) {
      const text = cleanDate(value);
      if (!/^\d{8}$/.test(text)) return null;
      return new Date(Number(text.slice(0, 4)), Number(text.slice(4, 6)) - 1, Number(text.slice(6, 8)));
    }

    function ymd(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}${month}${day}`;
    }

    function twDateToAD(value) {
      const parts = String(value).trim().split("/");
      if (parts.length !== 3) return "";
      const year = Number(parts[0]) + 1911;
      return `${year}${parts[1].padStart(2, "0")}${parts[2].padStart(2, "0")}`;
    }

    function parsePrice(value) {
      return Number(String(value ?? "").replace(/,/g, ""));
    }

    function addMonths(date, count) {
      return new Date(date.getFullYear(), date.getMonth() + count, 1);
    }

    function monthKey(date) {
      return `${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    async function fetchTWSEMonth(code, date) {
      const key = `${MARKET_TWSE}-${code}-${monthKey(date)}`;
      if (priceCache.has(key)) return priceCache.get(key);

      const url = `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${monthKey(date)}01&stockNo=${encodeURIComponent(code)}`;
      const rows = fetch(url)
        .then((response) => response.ok ? response.json() : null)
        .then((data) => {
          if (!data || !Array.isArray(data.data)) return [];
          return data.data.map((row) => ({
            date: twDateToAD(row[0]),
            close: parsePrice(row[6])
          })).filter((row) => row.date && Number.isFinite(row.close));
        })
        .catch(() => []);

      priceCache.set(key, rows);
      return rows;
    }

    async function fetchTPEXMonth(code, date) {
      const key = `${MARKET_TPEX}-${code}-${monthKey(date)}`;
      if (priceCache.has(key)) return priceCache.get(key);

      const twYear = date.getFullYear() - 1911;
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const dateText = `${twYear}/${month}`;
      const url = `https://www.tpex.org.tw/web/stock/aftertrading/daily_trading_info/st43_result.php?l=zh-tw&d=${encodeURIComponent(dateText)}&stkno=${encodeURIComponent(code)}`;
      const rows = fetch(url)
        .then((response) => response.ok ? response.json() : null)
        .then((data) => {
          const rawRows = Array.isArray(data?.aaData) ? data.aaData : [];
          return rawRows.map((row) => ({
            date: twDateToAD(row[0]),
            close: parsePrice(row[6])
          })).filter((row) => row.date && Number.isFinite(row.close));
        })
        .catch(() => []);

      priceCache.set(key, rows);
      return rows;
    }

    async function fetchPriceBars(code, startDate) {
      const months = [0, 1, 2, 3].map((offset) => addMonths(startDate, offset));
      let bars = (await Promise.all(months.map((date) => fetchTWSEMonth(code, date)))).flat();

      if (!bars.length) {
        bars = (await Promise.all(months.map((date) => fetchTPEXMonth(code, date)))).flat();
      }

      const startYmd = ymd(startDate);
      const sortedBars = bars
        .filter((bar) => bar.date >= startYmd)
        .sort((a, b) => a.date.localeCompare(b.date));
      const anchor = sortedBars.find((bar) => bar.date === startYmd);
      const futureBars = sortedBars.filter((bar) => bar.date > startYmd).slice(0, PRICE_DAYS);
      return anchor ? [anchor, ...futureBars] : futureBars;
    }

    async function showPriceForRecord(record) {
      const startDate = parseDate(record.date);
      if (!startDate) return;

      selectedRowKey = record.key;
      rowsBody.querySelectorAll("tr").forEach((row) => {
        row.classList.toggle("selected", row.dataset.key === selectedRowKey);
      });

      pricePanel.classList.add("active");
      priceTitle.textContent = `${record.code} ${record.name}`;
      priceMeta.textContent = `異動日期 ${showDate(record.date)}，查看後續最多 ${PRICE_DAYS} 個交易日`;
      priceStatus.textContent = "讀取股價中...";
      priceSummary.innerHTML = "";
      priceChart.innerHTML = "";
      priceRows.innerHTML = `<tr><td class="empty" colspan="4">讀取股價中...</td></tr>`;

      const bars = await fetchPriceBars(record.code, startDate);
      renderPricePanel(record, bars);
    }

    function renderPricePanel(record, bars) {
      if (!bars.length) {
        priceStatus.textContent = "無後續資料";
        priceSummary.innerHTML = "";
        priceChart.innerHTML = "";
        priceRows.innerHTML = `<tr><td class="empty" colspan="4">尚無後續股價資料</td></tr>`;
        return;
      }

      const first = bars[0];
      const last = bars[bars.length - 1];
      const diff = last.close - first.close;
      const pct = first.close ? (diff / first.close) * 100 : 0;
      const futureCount = bars.filter((bar) => bar.date > record.date).length;
      priceStatus.textContent = `已取得 ${futureCount} 個後續交易日`;
      priceSummary.innerHTML = `
        <div class="price-stat"><span>區間</span><strong>${showDate(first.date)} - ${showDate(last.date)}</strong></div>
        <div class="price-stat"><span>第一日收盤</span><strong>${formatPrice(first.close)}</strong></div>
        <div class="price-stat"><span>最後收盤</span><strong>${formatPrice(last.close)}</strong></div>
        <div class="price-stat"><span>區間漲跌幅</span><strong>${formatPct(pct)}</strong></div>
      `;
      renderPriceChart(bars, record.date);
      priceRows.innerHTML = bars.map((bar, index) => {
        const prev = index === 0 ? first.close : bars[index - 1].close;
        const dayDiff = bar.close - prev;
        const dayPct = prev ? (dayDiff / prev) * 100 : 0;
        return `
          <tr>
            <td>${showDate(bar.date)}</td>
            <td class="num">${formatPrice(bar.close)}</td>
            <td class="num">${formatSigned(dayDiff)}</td>
            <td class="num">${formatPct(dayPct)}</td>
          </tr>
        `;
      }).join("");
    }

    function renderPriceChart(bars, recordDate) {
      const width = 760;
      const height = 260;
      const pad = { top: 18, right: 18, bottom: 34, left: 54 };
      const values = bars.map((bar) => bar.close);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const span = max - min || 1;
      const x = (index) => pad.left + (bars.length === 1 ? 0 : index * (width - pad.left - pad.right) / (bars.length - 1));
      const y = (value) => pad.top + (max - value) * (height - pad.top - pad.bottom) / span;
      const points = bars.map((bar, index) => `${x(index)},${y(bar.close)}`).join(" ");
      const firstLabel = showDate(bars[0].date).slice(5);
      const lastLabel = showDate(bars[bars.length - 1].date).slice(5);

      priceChart.innerHTML = `
        <line x1="${pad.left}" y1="${height - pad.bottom}" x2="${width - pad.right}" y2="${height - pad.bottom}" stroke="#e5e7eb" />
        <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${height - pad.bottom}" stroke="#e5e7eb" />
        <text x="8" y="${y(max) + 4}">${formatPrice(max)}</text>
        <text x="8" y="${y(min) + 4}">${formatPrice(min)}</text>
        <text x="${pad.left}" y="${height - 10}">${firstLabel}</text>
        <text x="${width - pad.right - 38}" y="${height - 10}">${lastLabel}</text>
        <polyline fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="${points}" />
        ${bars.map((bar, index) => {
          const isRecordDate = bar.date === recordDate;
          const fill = isRecordDate ? "#dc2626" : "#2563eb";
          const radius = isRecordDate ? 5 : 3;
          const label = isRecordDate ? "異動日" : "交易日";
          return `<circle cx="${x(index)}" cy="${y(bar.close)}" r="${radius}" fill="${fill}"><title>${label} ${showDate(bar.date)} ${formatPrice(bar.close)}</title></circle>`;
        }).join("")}
      `;
    }

    function formatPrice(value) {
      return Number(value).toLocaleString("zh-TW", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatSigned(value) {
      return `${value > 0 ? "+" : ""}${formatPrice(value)}`;
    }

    function formatPct(value) {
      return `${value > 0 ? "+" : ""}${value.toFixed(2)}%`;
    }

    dateFilter.addEventListener("change", render);
    statusFilter.addEventListener("change", render);
    keywordFilter.addEventListener("input", render);
    reloadButton.addEventListener("click", loadWorkbook);
    rowsBody.addEventListener("click", (event) => {
      const row = event.target.closest("tr[data-code]");
      if (!row) return;
      showPriceForRecord({
        key: row.dataset.key,
        date: row.dataset.date,
        code: row.dataset.code,
        name: row.dataset.name
      });
    });
    rowsBody.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      const row = event.target.closest("tr[data-code]");
      if (row) row.click();
    });
    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const buffer = await file.arrayBuffer();
      useWorkbookBuffer(buffer, file.name);
    });
    loadWorkbook();
  </script>
</body>
</html>
